command:
  artifact:
    deploy:
      options:
        git-url:
          - foobar@github.com
        post-build-script: script-path.sh
        artifact-dir: deploy
  site:
    alias-build:
      options:
        app-id: acquia-app-id
        app-key: key
        app-secret: secret
        alias-dir: drush/sites
  source:
    build:
      settings:
        options:
          db-port: 3306
          db-host: mysql
          db-user: root
          db-pass: password
          db-name: drupal
          multisites:
            - default
